<header class="site-header">
  <div class="container">
    <a class="site-header__logo" href="{{ '/' | relative_url }}">
      <span class="logo-name">{{ site.author.name }}</span>
      <span class="logo-role">{{ site.tagline }}</span>
    </a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
      <a href="{{ '/projects/' | relative_url }}" {% if page.url contains '/projects' %}class="active"{% endif %}>Projects</a>
      <a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>About</a>
      <a href="{{ '/contact/' | relative_url }}" class="btn btn--nav">Contact</a>
    </nav>
  </div>
</header>
