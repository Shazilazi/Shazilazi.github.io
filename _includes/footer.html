<footer class="site-footer">
  <div class="container">
    <p class="site-footer__name">{{ site.author.name }}</p>
    <nav class="site-footer__links">
      {% if site.author.linkedin %}
        <a href="{{ site.author.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
      {% endif %}
      {% if site.author.github %}
        <a href="{{ site.author.github }}" target="_blank" rel="noopener">GitHub</a>
      {% endif %}
      {% if site.author.email %}
        <a href="mailto:{{ site.author.email }}">Email</a>
      {% endif %}
    </nav>
    <p class="site-footer__copy">© {{ 'now' | date: "%Y" }} {{ site.author.name }}</p>
  </div>
</footer>
