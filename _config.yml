# Default social preview image, used by jekyll-seo-tag for Open Graph /
# Twitter card meta tags (og:image, twitter:image, twitter:card, etc.)
# Individual pages/projects can override by setting their own `image` in
# front matter (e.g. a project screenshot).
image:
  path: /assets/images/og-image.png
  width: 1200
  height: 630

include:
  - _pages

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: "_pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

markdown: kramdown
plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
